name-template: "pweb_amano-v$RESOLVED_VERSION"
tag-template: "pweb_amano-v$RESOLVED_VERSION"
# Without this, release-drafter ignores published prereleases when finding
# the "previous release" to diff against, so re-triggering after a
# prerelease publish (e.g. the manifest-sync commit's push to main)
# recomputes the same version and drafts a duplicate.
include-pre-releases: true
version-resolver:
  minor:
    labels: ["enhancement", "feature"]
  patch:
    labels: ["bug", "fix", "chore", "dependencies", "ci"]
  default: patch
categories:
  - title: "New Features"
    labels: ["enhancement", "feature"]
  - title: "Bug Fixes"
    labels: ["bug", "fix"]
  - title: "Maintenance"
    labels: ["chore", "dependencies", "ci"]
autolabeler:
  - label: enhancement
    title:
      - '/^feat(\(.+\))?!?:/i'
  - label: fix
    title:
      - '/^(fix|perf|revert)(\(.+\))?!?:/i'
  - label: chore
    title:
      - '/^(chore|ci|docs|refactor|build|style|test)(\(.+\))?!?:/i'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...pweb_amano-v$RESOLVED_VERSION
